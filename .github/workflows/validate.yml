name: Validate

on:
  pull_request:
    branches: [main, master, development]
  push:
    branches: [main, master, development]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run linting
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then yarn lint; fi

      - name: Run tests
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then yarn test; fi

      - name: Run build
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build ? 0 : 1)"; then yarn build; fi
